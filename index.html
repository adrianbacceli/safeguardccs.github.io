    <meta id="theme-color" name="theme-color" content="#f8fafc" />
    <script>
      (() => {
        const lightColor = "#f8fafc";
        const darkColor = "#020617";

        let theme = null;
        try {
          theme = localStorage.getItem("theme");
        } catch {
          theme = null;
        }

        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const isDark = theme === "dark" || (theme !== "light" && prefersDark);
        const root = document.documentElement;

        root.classList.toggle("dark", isDark);
        root.style.colorScheme = isDark ? "dark" : "light";

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute("content", isDark ? darkColor : lightColor);
        }
      })();
    </script>

        <section id="faq">
          <h2>Frequently Asked Questions</h2>
          <p>Short answers to common questions. For anything specific, contact us and we will point you in the right direction.</p>

          <details>
            <summary>How much does a cybersecurity service cost?</summary>
            <p>Practical security steps that stop many basic threats can be cheaper than people think. A strong foundation is achievable with small budgets when the priorities and advisors are right.</p>
            <p>A full program depends on the scope, company size, systems involved, urgency, and whether the work is one-time or ongoing.</p>
            <p>A short discovery conversation is usually the best way to recommend a practical starting point.</p>
          </details>
          <details>
            <summary>Who do you usually help?</summary>
            <p>We work with small and medium businesses, with special attention to protecting business owners' budgets while improving security.</p>
            <p>Common clients include accounting and tax firms, legal and compliance practices, professional services, health and wellness clinics, small retail, and local businesses.</p>
          </details>
          <details>
            <summary>Where should we start if we do not have a cybersecurity program?</summary>
            <p>Start by understanding what systems you use, what data you handle, who has access, and which risks could hurt the business first.</p>
            <p>Our first step is helping you discover where you are, then turning that into a practical roadmap without overwhelming your team.</p>
          </details>
          <details>
            <summary>Do you replace our IT provider?</summary>
            <p>We can own or support security-heavy IT tasks, but we do not replace a regular helpdesk or day-to-day IT support team.</p>
            <p>We work alongside your IT team or provider to heavy lift, advise, improve visibility, harden systems, and reduce risk.</p>
          </details>
          <details>
            <summary>Ley 81 and GDPR: what are they, and can you help?</summary>
            <p>Ley 81 in Panama and the GDPR in Europe are data protection rules that matter when a business handles personal data.</p>
            <p>We help with the security side of those obligations by identifying gaps and implementing strong standards, including ISMS practices aligned with ISO 27000, so the business is better prepared for demanding compliance expectations.</p>
            <p>For legal interpretation, we recommend qualified legal counsel.</p>
          </details>
          <details>
            <summary>What is an ISMS, and why does ISO 27001 matter?</summary>
            <p>An ISMS is the structured way a company manages information security: risks, policies, responsibilities, controls, evidence, and improvement following international standards like ISO 27001.</p>
            <p>We can help you prepare, maintain, or improve it by translating these concepts into simpler terms: who does what, how it is done, and how to follow international best practices without unnecessary hurdles.</p>
          </details>
          <details>
            <summary>Do you offer one-time consulting or ongoing support?</summary>
            <p>Yes. Some clients need a focused review, audit preparation, or help with a specific risk. Others need ongoing monitoring, vulnerability management, hardening, and security improvement.</p>
            <p>We scope the work around the need and budget. We adapt the engagement to the company, not the other way around.</p>
          </details>
          <details>
            <summary>Can you help with vulnerability scanning and security monitoring?</summary>
            <p>Yes. We help organizations see vulnerabilities, exposed systems, security weaknesses, and operational risks more clearly.</p>
            <p>Depending on scope, we can support scanning, findings review, remediation guidance, hardening recommendations, and monitoring.</p>
          </details>
          <details>
            <summary>Do you guarantee that my company will not be hacked?</summary>
            <p>No honest provider can guarantee that. Cybersecurity requires shifting the question from "Will I be hacked?" to "How do we operate when it happens?"</p>
            <p>We work from a Zero Trust and assume-breach mindset: protect systems, data, and access even if someone is already inside the environment.</p>
          </details>
